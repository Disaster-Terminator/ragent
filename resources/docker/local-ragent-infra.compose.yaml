name: ragent-local-infra

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ragent-postgres
    environment:
      POSTGRES_DB: ragent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ragent-postgres-data:/var/lib/postgresql/data
      - ../database/schema_pg.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/init_data_pg.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: ragent-redis
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ragent-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.72
    container_name: ragent-rustfs
    command:
      - "--address"
      - ":9000"
      - "--console-enable"
      - "--access-key"
      - "rustfsadmin"
      - "--secret-key"
      - "rustfsadmin"
      - "/data"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ragent-rustfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/rustfs/console/index.html >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  rmqnamesrv:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: ragent-rmqnamesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx400m"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'The Name Server boot success' /home/rocketmq/logs/rocketmqlogs/namesrv.log || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rmqbroker:
    image: apache/rocketmq:5.2.0
    platform: linux/amd64
    container_name: ragent-rmqbroker
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: "ragent-rmqnamesrv:9876"
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    depends_on:
      rmqnamesrv:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat > /home/rocketmq/rocketmq-5.2.0/conf/broker.conf << EOF
        brokerClusterName = DefaultCluster
        brokerName = broker-a
        brokerId = 0
        deleteWhen = 04
        fileReservedTime = 48
        brokerRole = ASYNC_MASTER
        flushDiskType = ASYNC_FLUSH
        brokerIP1 = 127.0.0.1
        timerMaxDelaySec = 31622400
        EOF
        sh mqbroker --enable-proxy -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf
    restart: unless-stopped

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    platform: linux/amd64
    container_name: ragent-rocketmq-dashboard
    ports:
      - "18082:8082"
    environment:
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -XX:MaxMetaspaceSize=256m
        -Drocketmq.config.enableDashBoardCollect=false
        -Drocketmq.namesrv.addr=ragent-rmqnamesrv:9876
    depends_on:
      rmqbroker:
        condition: service_started
    restart: unless-stopped

volumes:
  ragent-postgres-data:
  ragent-redis-data:
  ragent-rustfs-data:
